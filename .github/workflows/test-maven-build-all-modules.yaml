name: Build and Test

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
#      - name: Cache Maven packages
#        uses: actions/cache@v4
#        with:
#          path: |
#            ~/.m2/repository
#            ~/.m2/wrapper
#          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
#          restore-keys: |
#            ${{ runner.os }}-maven-

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>TaurMorchant</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.CORE_LIBS_TOKEN_TEST_VLLA }}

      - name: Build and test all modules
        run: |
          echo "🔨 Building all modules with tests and coverage..."
          
          mvn clean deploy \
            --batch-mode \
            --show-version

        env:
          GITHUB_TOKEN: ${{ secrets.CORE_LIBS_TOKEN_TEST_VLLA }}

      - name: SonarQube analysis for all modules
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.CORE_LIBS_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
        run: |
          echo "📊 Running SonarQube analysis for all modules..."
          echo ""
          
          MODULES=(
            "core-utils"
            "core-error-handling"
          )
          
          for MODULE in "${MODULES[@]}"; do
            if [ ! -d "$MODULE" ]; then
              echo "⚠️  Module directory not found: $MODULE (skipping)"
              continue
            fi
          
            echo "Analyzing module: $MODULE"
          
            PROJECT_KEY="netcracker_qubership-core-java-libs_${MODULE}"
          
            cd "$MODULE"
          
            mvn org.sonarsource.scanner.maven:sonar-maven-plugin:5.0.0.4389:sonar \
              --batch-mode \
              -Dsonar.organization=netcracker \
              -Dsonar.projectKey=${PROJECT_KEY} \
              -Dsonar.projectName="${MODULE}" \
              -Dsonar.host.url=https://sonarcloud.io \
              -Dsonar.token=${SONAR_TOKEN} \
              -Dsonar.projectBaseDir=. \
              -Dsonar.java.coveragePlugin=jacoco \
              -Dsonar.scm.provider=git
            
            cd ..
          
            echo "✓ Completed analysis for: $MODULE"
            echo ""
          done
          
          echo "All modules analyzed successfully!"

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: |
            **/target/*.jar
            **/target/*.war
          retention-days: 7
          if-no-files-found: warn

      - name: Upload coverage reports
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-${{ github.sha }}
          path: |
            **/target/site/jacoco/
          retention-days: 7
          if-no-files-found: warn

      - name: Generate build summary
        if: always()
        run: |
          echo "# Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Event:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Build and analysis completed successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Build or analysis failed. Check the logs above." >> $GITHUB_STEP_SUMMARY
          fi